name: CI
run-name: ${{ github.actor }} CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show make help
        run: make help

      - name: Install dependencies (venv)
        run: make setup-venv

      - name: Run tests
        run: make tests

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: List files
        shell: pwsh
        run: Get-ChildItem -Force
